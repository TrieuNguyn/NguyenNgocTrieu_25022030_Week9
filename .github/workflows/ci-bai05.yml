name: Java CI + JaCoCo Coverage (Bai5)

on:
  push:
    branches: [ "**" ]
    paths:
      - "Bai05/**"
      - ".github/workflows/ci-bai05.yml"
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build, test and verify coverage
        working-directory: Bai05
        # mvn verify chạy: compile → test → jacoco:check (fail nếu < 80%)
        run: mvn clean verify --batch-mode

      - name: Upload JaCoCo HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14
