name: Java CI - Matrix Strategy (Bai4)

on:
  push:
    branches: [ "**" ]
    paths:
      - "Bai04/**"
  pull_request:
    branches: [ main ]

jobs:
  build:
    # Matrix: chạy song song trên 3 OS
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
      fail-fast: false   # không dừng ngay khi 1 OS fail, để xem hết kết quả

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and test
        run: mvn clean test --batch-mode

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: target/surefire-reports/
          retention-days: 7
